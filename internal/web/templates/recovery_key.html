{{define "content"}}
<div class="container container-tight py-4">
    <div class="card card-md">
        <div class="card-body">
            <h2 class="h2 text-center mb-4">
                <i class="ti ti-key"></i> {{t "recovery.title"}}
            </h2>

            <!-- Warning -->
            <div class="alert alert-danger mb-4">
                <div class="d-flex">
                    <div>
                        <i class="ti ti-alert-triangle me-2"></i>
                    </div>
                    <div>
                        <h4 class="alert-title">{{t "recovery.warning_title"}}</h4>
                        <div class="text-muted">{{t "recovery.warning_text"}}</div>
                    </div>
                </div>
            </div>

            <!-- Recovery Key Display -->
            <div class="card bg-primary-lt mb-4">
                <div class="card-body text-center">
                    <div id="recovery-key" class="font-monospace fs-3 fw-bold mb-3" style="word-break: break-word; line-height: 1.8;">
                        {{.RecoveryKey}}
                    </div>
                    <button onclick="copyRecoveryKey()" class="btn btn-primary">
                        <i class="ti ti-copy me-2"></i>{{t "recovery.copy"}}
                    </button>
                </div>
            </div>

            <!-- Instructions -->
            <div class="card bg-muted-lt mb-4">
                <div class="card-body">
                    <h3 class="card-title">{{t "recovery.how_to_save"}}</h3>
                    <ol class="mb-0">
                        <li class="mb-2">{{t "recovery.instruction_1"}}</li>
                        <li class="mb-2">{{t "recovery.instruction_2"}}</li>
                        <li>{{t "recovery.instruction_3"}}</li>
                    </ol>
                </div>
            </div>

            <!-- Confirmation -->
            <div class="mb-3">
                <label class="form-check">
                    <input type="checkbox" class="form-check-input" id="confirm-checkbox">
                    <span class="form-check-label">{{t "recovery.i_saved"}}</span>
                </label>
            </div>

            <div class="form-footer">
                <a href="/dashboard" id="continue-btn" class="btn btn-primary w-100 disabled">
                    {{t "recovery.continue"}} <i class="ti ti-arrow-right ms-2"></i>
                </a>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('confirm-checkbox').addEventListener('change', function() {
    var btn = document.getElementById('continue-btn');
    if (this.checked) {
        btn.classList.remove('disabled');
    } else {
        btn.classList.add('disabled');
    }
});

function copyRecoveryKey() {
    const recoveryKey = document.getElementById('recovery-key').textContent.trim();

    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(recoveryKey).then(() => {
            alert('Recovery key copied to clipboard!');
        }).catch(err => {
            console.error('Failed to copy:', err);
            fallbackCopy(recoveryKey);
        });
    } else {
        fallbackCopy(recoveryKey);
    }
}

function fallbackCopy(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try {
        document.execCommand('copy');
        alert('Recovery key copied to clipboard!');
    } catch (err) {
        console.error('Failed to copy:', err);
        alert('Failed to copy. Please select and copy manually.');
    }
    document.body.removeChild(textarea);
}
</script>
{{end}}
