<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - {{t "app.name"}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- htmx for AJAX interactions -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js for interactive components -->
    <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
</head>
<body>
    {{if .User}}
    <!-- Navigation for logged-in users -->
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/dashboard">{{t "app.name"}}</a>
        </div>
        <div class="nav-links">
            <a href="/inbox" class="nav-link">{{t "nav.inbox"}}</a>
            <a href="/compose" class="nav-link">{{t "nav.compose"}}</a>
            <a href="/accounts" class="nav-link">{{t "nav.accounts"}}</a>
            <div x-data="{ open: false }" class="dropdown">
                <button @click="open = !open" class="nav-link">
                    {{.User.Username}} ▾
                </button>
                <div x-show="open" @click.away="open = false" class="dropdown-menu">
                    <a href="/settings" class="dropdown-item">{{t "nav.settings"}}</a>
                    <a href="/logout" class="dropdown-item">{{t "auth.logout"}}</a>
                </div>
            </div>
        </div>
    </nav>
    {{end}}

    <!-- Flash messages -->
    {{if .FlashSuccess}}
    <div class="alert alert-success">{{.FlashSuccess}}</div>
    {{end}}
    {{if .FlashError}}
    <div class="alert alert-error">{{.FlashError}}</div>
    {{end}}

    <!-- Main content -->
    <main class="container">
        {{template "content" .}}
    </main>

    <footer class="footer">
        <p>&copy; 2024 {{t "app.footer"}}</p>
    </footer>
</body>
</html>
