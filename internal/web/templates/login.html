{{define "content"}}
<div class="auth-container">
    <div class="auth-box" x-data="{ tab: 'login' }">
        <h1 class="auth-title">DDMailServer</h1>
        <p class="auth-subtitle">Self-hosted Email Aggregator</p>

        <!-- Tab buttons -->
        <div class="tabs">
            <button @click="tab = 'login'" :class="{ 'active': tab === 'login' }" class="tab">
                Login
            </button>
            <button @click="tab = 'register'" :class="{ 'active': tab === 'register' }" class="tab">
                Register
            </button>
        </div>

        <!-- Login form -->
        <form x-show="tab === 'login'"
              hx-post="/api/login"
              hx-target="#auth-error"
              hx-swap="innerHTML"
              class="auth-form">
            <div id="auth-error" class="error-message"></div>

            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" name="username" required autofocus>
            </div>

            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Login
            </button>
        </form>

        <!-- Register form -->
        <form x-show="tab === 'register'"
              hx-post="/api/register"
              hx-target="#auth-error"
              hx-swap="innerHTML"
              class="auth-form">
            <div id="auth-error" class="error-message"></div>

            <div class="form-group">
                <label for="register-username">Username</label>
                <input type="text" id="register-username" name="username" required>
            </div>

            <div class="form-group">
                <label for="register-email">Email</label>
                <input type="email" id="register-email" name="email" required>
            </div>

            <div class="form-group">
                <label for="register-password">Password</label>
                <input type="password" id="register-password" name="password" required minlength="6">
            </div>

            <div class="form-group">
                <label for="register-password-confirm">Confirm Password</label>
                <input type="password" id="register-password-confirm" name="password_confirm" required minlength="6">
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Register
            </button>
        </form>
    </div>
</div>
{{end}}
