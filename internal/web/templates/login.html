{{define "content"}}
<div class="container container-tight py-4">
    <div class="card card-md">
        <div class="card-body">
            <h2 class="h2 text-center mb-4">{{t "app.name"}}</h2>
            <p class="text-muted text-center mb-4">{{t "app.subtitle"}}</p>

            <!-- Tabs -->
            <ul class="nav nav-tabs nav-fill mb-3" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button">
                        {{t "auth.login"}}
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane" type="button">
                        {{t "auth.register"}}
                    </button>
                </li>
            </ul>

            <div class="tab-content">
                <!-- Login form -->
                <div class="tab-pane fade show active" id="login-pane" role="tabpanel">
                    <form hx-post="/api/login"
                          hx-target="#login-error"
                          hx-swap="innerHTML">
                        <div id="login-error" class="alert alert-danger" style="display: none;"></div>

                        <div class="mb-3">
                            <label class="form-label" for="login-username">{{t "auth.username"}}</label>
                            <input type="text" id="login-username" name="username" class="form-control" required autofocus>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="login-password">
                                {{t "auth.password"}}
                                <span class="form-label-description">
                                    <a href="/forgot-password">{{t "forgot.title"}}?</a>
                                </span>
                            </label>
                            <input type="password" id="login-password" name="password" class="form-control" required>
                        </div>

                        <div class="form-footer">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="ti ti-login me-2"></i>{{t "auth.login"}}
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Register form -->
                <div class="tab-pane fade" id="register-pane" role="tabpanel">
                    <form hx-post="/api/register"
                          hx-target="#register-error"
                          hx-swap="innerHTML">
                        <div id="register-error" class="alert alert-danger" style="display: none;"></div>

                        <div class="mb-3">
                            <label class="form-label" for="register-username">{{t "auth.username"}}</label>
                            <input type="text" id="register-username" name="username" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="register-password">{{t "auth.password"}}</label>
                            <input type="password" id="register-password" name="password" class="form-control" required minlength="6">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="register-password-confirm">{{t "auth.password_confirm"}}</label>
                            <input type="password" id="register-password-confirm" name="password_confirm" class="form-control" required minlength="6">
                        </div>

                        <div class="form-footer">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="ti ti-user-plus me-2"></i>{{t "auth.register"}}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Show error messages
document.body.addEventListener('htmx:beforeSwap', function(evt) {
    if (evt.detail.xhr.status >= 400 && evt.detail.xhr.status < 600) {
        evt.detail.shouldSwap = true;
        evt.detail.isError = false;
        // Show the alert container
        evt.detail.target.style.display = 'block';
    }
});

// Handle successful login/register
document.body.addEventListener('htmx:afterRequest', function(evt) {
    var status = evt.detail.xhr.status;
    if (status >= 200 && status < 300) {
        if (evt.detail.xhr.responseURL.includes('/api/register')) {
            window.location.href = '/recovery-key';
        } else if (evt.detail.xhr.responseURL.includes('/api/login')) {
            window.location.href = '/dashboard';
        }
    }
});

// Clear error on new request
document.body.addEventListener('htmx:beforeRequest', function(evt) {
    var target = evt.detail.target;
    if (target && target.classList.contains('alert')) {
        target.style.display = 'none';
        target.textContent = '';
    }
});
</script>
{{end}}
