{{define "content"}}
<div class="container container-tight py-4">
    <div class="card card-md">
        <div class="card-body">
            <h2 class="h2 text-center mb-4">
                <i class="ti ti-key"></i> {{t "forgot.title"}}
            </h2>
            <p class="text-muted text-center mb-4">{{t "forgot.subtitle"}}</p>

            <form hx-post="/api/forgot-password"
                  hx-target="#forgot-error"
                  hx-swap="innerHTML">
                <div id="forgot-error" class="alert alert-danger" style="display: none;"></div>

                <div class="mb-3">
                    <label class="form-label" for="username">{{t "forgot.username"}}</label>
                    <input type="text" id="username" name="username" class="form-control" required autofocus>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="recovery_key">{{t "forgot.recovery_key"}}</label>
                    <textarea id="recovery_key"
                              name="recovery_key"
                              rows="3"
                              class="form-control"
                              required
                              placeholder="{{t "forgot.recovery_key_placeholder"}}"></textarea>
                    <small class="form-hint">Enter all 12 words separated by spaces</small>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="new_password">{{t "forgot.new_password"}}</label>
                    <input type="password" id="new_password" name="new_password" class="form-control" required minlength="6">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="confirm_password">{{t "forgot.confirm_password"}}</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" required minlength="6">
                </div>

                <div class="form-footer">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="ti ti-refresh me-2"></i>{{t "forgot.reset_button"}}
                    </button>
                </div>
            </form>

            <div class="text-center text-muted mt-3">
                <a href="/login">{{t "forgot.back_to_login"}}</a>
            </div>
        </div>
    </div>
</div>

<script>
document.body.addEventListener('htmx:beforeSwap', function(evt) {
    if (evt.detail.xhr.status >= 400 && evt.detail.xhr.status < 600) {
        evt.detail.shouldSwap = true;
        evt.detail.isError = false;
        evt.detail.target.style.display = 'block';
    }
});

document.body.addEventListener('htmx:afterRequest', function(evt) {
    if (evt.detail.successful && evt.detail.xhr.responseURL.includes('/api/forgot-password')) {
        try {
            const response = JSON.parse(evt.detail.xhr.responseText);
            if (response.message) {
                alert('{{t "forgot.success"}}');
                window.location.href = '/login';
            }
        } catch (e) {
            console.error('Failed to parse response:', e);
        }
    }
});
</script>
{{end}}
