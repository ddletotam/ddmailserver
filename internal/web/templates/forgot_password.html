{{define "content"}}
<div class="auth-container">
    <div class="auth-box">
        <h1 class="auth-title">🔑 {{t "forgot.title"}}</h1>
        <p class="auth-subtitle">{{t "forgot.subtitle"}}</p>

        <form hx-post="/api/forgot-password"
              hx-target="#forgot-error"
              hx-swap="innerHTML"
              class="auth-form">
            <div id="forgot-error" class="error-message"></div>

            <div class="form-group">
                <label for="username">{{t "forgot.username"}}</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>

            <div class="form-group">
                <label for="recovery_key">{{t "forgot.recovery_key"}}</label>
                <textarea id="recovery_key"
                          name="recovery_key"
                          rows="3"
                          required
                          placeholder="{{t "forgot.recovery_key_placeholder"}}"></textarea>
                <small style="color: var(--text-muted);">
                    Enter all 12 words separated by spaces
                </small>
            </div>

            <div class="form-group">
                <label for="new_password">{{t "forgot.new_password"}}</label>
                <input type="password" id="new_password" name="new_password" required minlength="6">
            </div>

            <div class="form-group">
                <label for="confirm_password">{{t "forgot.confirm_password"}}</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                {{t "forgot.reset_button"}}
            </button>

            <div style="text-align: center; margin-top: 1rem;">
                <a href="/login" class="btn-link">{{t "forgot.back_to_login"}}</a>
            </div>
        </form>
    </div>
</div>
{{end}}
