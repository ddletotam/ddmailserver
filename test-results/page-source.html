<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DDMailServer</title>
    <link rel="stylesheet" href="/static/css/style.css">
    
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <script defer="" src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
<style>                      .htmx-indicator{opacity:0}                      .htmx-request .htmx-indicator{opacity:1; transition: opacity 200ms ease-in;}                      .htmx-request.htmx-indicator{opacity:1; transition: opacity 200ms ease-in;}                    </style></head>
<body>
    

    
    
    

    
    <main class="container">
        
<div class="auth-container">
    <div class="auth-box">
        <h1 class="auth-title">DDMailServer</h1>
        <p class="auth-subtitle">Self-hosted Email Aggregator</p>

        
        <div class="tabs">
            <button onclick="switchTab('login')" id="login-tab" class="tab active">
                Login
            </button>
            <button onclick="switchTab('register')" id="register-tab" class="tab">
                Register
            </button>
        </div>

        
        <form id="login-form" hx-post="/api/login" hx-target="#login-error" hx-swap="innerHTML" class="auth-form">
            <div id="login-error" class="error-message"></div>

            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" name="username" required="" autofocus="">
            </div>

            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" required="">
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Login
            </button>

            <div style="text-align: center; margin-top: 1rem;">
                <a href="/forgot-password" class="btn-link">Forgot Password?</a>
            </div>
        </form>

        
        <form id="register-form" hx-post="/api/register" hx-target="#register-error" hx-swap="innerHTML" class="auth-form hidden">
            <div id="register-error" class="error-message"></div>

            <div class="form-group">
                <label for="register-username">Username</label>
                <input type="text" id="register-username" name="username" required="">
            </div>

            <div class="form-group">
                <label for="register-email">Email <small style="color: var(--text-muted);">(optional)</small></label>
                <input type="email" id="register-email" name="email">
            </div>

            <div class="form-group">
                <label for="register-password">Password</label>
                <input type="password" id="register-password" name="password" required="" minlength="6">
            </div>

            <div class="form-group">
                <label for="register-password-confirm">Confirm Password</label>
                <input type="password" id="register-password-confirm" name="password_confirm" required="" minlength="6">
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Register
            </button>
        </form>
    </div>
</div>

<script>

function switchTab(tab) {
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const loginTab = document.getElementById('login-tab');
    const registerTab = document.getElementById('register-tab');

    if (tab === 'login') {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
    } else {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
        loginTab.classList.remove('active');
        registerTab.classList.add('active');
    }
}


document.body.addEventListener('htmx:afterRequest', function(evt) {
    if (evt.detail.successful && evt.detail.xhr.responseURL.includes('/api/register')) {
        try {
            const response = JSON.parse(evt.detail.xhr.responseText);
            if (response.recovery_key) {
                
                window.location.href = '/recovery-key?key=' + encodeURIComponent(response.recovery_key);
            }
        } catch (e) {
            console.error('Failed to parse registration response:', e);
        }
    } else if (evt.detail.successful && evt.detail.xhr.responseURL.includes('/api/login')) {
        
        window.location.href = '/dashboard';
    }
});
</script>

    </main>

    <footer class="footer">
        <p>© 2024 DDMailServer - Self-hosted Email Aggregator</p>
    </footer>


</body></html>
